name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v4

      - name: Test
        run: make test

      - name: Lint
        run: make lint

      - name: Vuln scan
        run: make vuln

      - name: Verify modules
        run: make verify

      - name: Check generated code
        run: make check-generate
