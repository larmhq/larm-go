name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v4

      - name: Verify Version constant matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          SOURCE_VERSION=$(awk -F'"' '/Version *= */ {print $2; exit}' client/version.go)
          if [ -z "$SOURCE_VERSION" ]; then
            echo "Failed to extract Version constant from client/version.go"
            exit 1
          fi
          if [ "$TAG_VERSION" != "$SOURCE_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match Version constant ($SOURCE_VERSION) in client/version.go"
            echo "Bump the constant before tagging, or delete the tag and re-tag the correct commit."
            exit 1
          fi

      - name: Verify
        run: |
          make test
          make lint
          make vuln
          make verify
          make check-generate

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes
